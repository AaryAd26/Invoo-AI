version: '3.8 '

services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    networks:
      - invoo-network

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - invoo-network

networks:
  invoo-network:
    driver: bridge 